<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fontes Externas</title>
    <style>
        @font-face {
            font-family: 'love' ;
            src: url('fonts/Cherish\ Free.otf') format('opentype'), url('fonts/Cherish\ Free.tff') format('truetype');
            font-weight: normal;
            font-style: normal;



 
            /*
            Tipos format ()
                - opentype (otf)
                - truetype (ttf)
                - embedded-opentype
                - truetype-aat (Apple Advanced Typography)
                - svg

            */
        }
        body {
            font-family: Arial, Helvetica, sans-serif;
        }

        h1 {
            font-family: 'Love', Times, serif;
            font-size: 3em;
            font-weight: normal;

        }

    </style>
</head>
<body>
    <h1>Título</h1>
    <p>Lorem ipsum dolor sit amet consectetur, adipisicing elit. Deleniti cumque ipsum temporibus doloremque molestiae ratione dolorem quos quasi suscipit voluptate repellat incidunt modi, in, obcaecati, facere ullam accusamus fugiat laborum.</p>
</body>
</html>
